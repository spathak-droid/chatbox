<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Practice</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      padding: 16px;
      min-height: 100px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    .waiting {
      text-align: center;
      padding: 40px 16px;
      color: #6c757d;
      font-size: 16px;
    }

    .waiting .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #dee2e6;
      border-top-color: #6c757d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e9ecef;
    }

    .header .topic-badge {
      background: #4361ee;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .header .difficulty-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .difficulty-badge.easy { background: #d4edda; color: #155724; }
    .difficulty-badge.medium { background: #fff3cd; color: #856404; }
    .difficulty-badge.hard { background: #f8d7da; color: #721c24; }

    .progress {
      text-align: center;
      font-size: 14px;
      color: #6c757d;
      margin-bottom: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e9ecef;
      border-radius: 3px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: #4361ee;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .problem-card {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    .problem-card .question {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      line-height: 1.3;
    }

    .answer-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .answer-row input {
      flex: 1;
      padding: 12px 16px;
      font-size: 20px;
      border: 2px solid #dee2e6;
      border-radius: 12px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .answer-row input:focus {
      border-color: #4361ee;
    }

    .btn {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #4361ee;
      color: white;
    }

    .btn-primary:hover {
      background: #3a56d4;
    }

    .btn-secondary {
      background: #e9ecef;
      color: #495057;
    }

    .btn-secondary:hover {
      background: #dee2e6;
    }

    .btn-hint {
      width: 100%;
      background: #f0f0f5;
      color: #6c757d;
      font-size: 14px;
      padding: 10px;
    }

    .btn-hint:hover {
      background: #e5e5ee;
    }

    .feedback {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 16px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .feedback.correct {
      background: #d4edda;
      color: #155724;
    }

    .feedback.incorrect {
      background: #f8d7da;
      color: #721c24;
    }

    .hint-text {
      background: #fff3cd;
      color: #856404;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 16px;
      text-align: center;
    }

    .summary-card {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .summary-card h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .summary-card .score {
      font-size: 48px;
      font-weight: 800;
      color: #4361ee;
      margin: 16px 0;
    }

    .summary-card .accuracy {
      font-size: 18px;
      color: #6c757d;
      margin-bottom: 20px;
    }

    .wrong-list {
      text-align: left;
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .wrong-list h3 {
      font-size: 14px;
      color: #6c757d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .wrong-list .wrong-item {
      padding: 8px 0;
      border-bottom: 1px solid #e9ecef;
      font-size: 14px;
    }

    .wrong-list .wrong-item:last-child {
      border-bottom: none;
    }

    .wrong-item .correct-answer {
      color: #28a745;
      font-weight: 600;
    }

    .wrong-item .your-answer {
      color: #dc3545;
      text-decoration: line-through;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Waiting state -->
    <div id="waiting" class="waiting">
      <div class="spinner"></div>
      <div>Waiting for session...</div>
    </div>

    <!-- Active problem view -->
    <div id="game" class="hidden">
      <div class="header">
        <span id="topicBadge" class="topic-badge">addition</span>
        <span id="difficultyBadge" class="difficulty-badge easy">easy</span>
      </div>

      <div class="progress">Problem <span id="currentNum">1</span> of <span id="totalNum">5</span></div>
      <div class="progress-bar"><div id="progressFill" class="fill" style="width: 0%"></div></div>

      <div class="problem-card">
        <div id="question" class="question">2 + 3 = ?</div>
        <div class="answer-row">
          <input type="number" id="answerInput" placeholder="Your answer" autofocus>
          <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">Submit</button>
        </div>
        <button class="btn btn-hint" id="hintBtn" onclick="requestHint()">Show Hint</button>
      </div>

      <div id="feedback" class="feedback hidden"></div>
      <div id="hintText" class="hint-text hidden"></div>
    </div>

    <!-- Summary view -->
    <div id="summary" class="hidden">
      <div class="summary-card">
        <h2>Session Complete</h2>
        <div id="summaryScore" class="score">0/0</div>
        <div id="summaryAccuracy" class="accuracy">0% accuracy</div>
        <div id="wrongList" class="wrong-list hidden">
          <h3>Review Mistakes</h3>
          <div id="wrongItems"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // State
    let state = {}
    let sessionId = null
    let feedbackTimeout = null

    // Elements
    const waitingEl = document.getElementById('waiting')
    const gameEl = document.getElementById('game')
    const summaryEl = document.getElementById('summary')
    const questionEl = document.getElementById('question')
    const answerInput = document.getElementById('answerInput')
    const feedbackEl = document.getElementById('feedback')
    const hintTextEl = document.getElementById('hintText')
    const currentNumEl = document.getElementById('currentNum')
    const totalNumEl = document.getElementById('totalNum')
    const progressFill = document.getElementById('progressFill')
    const topicBadge = document.getElementById('topicBadge')
    const difficultyBadge = document.getElementById('difficultyBadge')
    const submitBtn = document.getElementById('submitBtn')

    // postMessage bridge
    function sendToHost(message) {
      window.parent.postMessage(message, '*')
    }

    function sendResize() {
      const height = document.body.scrollHeight + 32
      sendToHost({ type: 'app.resize', height })
    }

    window.addEventListener('message', (event) => {
      const msg = event.data
      if (!msg || !msg.type) return

      switch (msg.type) {
        case 'host.init':
          sessionId = msg.appSessionId
          if (msg.state && msg.state.problems) {
            state = msg.state
            renderProblem()
          }
          break

        case 'host.state_patch':
          state = { ...state, ...msg.patch }
          if (state.finished) {
            renderSummary()
          } else if (state.problems) {
            renderProblem()
          }
          break

        case 'host.tool_result':
          handleToolResult(msg.toolName, msg.result)
          break
      }
    })

    function handleToolResult(toolName, result) {
      if (result.status === 'error') {
        showFeedback(result.error || 'An error occurred', 'incorrect')
        return
      }

      if (result.data) {
        state = { ...state, ...result.data }
      }

      switch (toolName) {
        case 'math_start_session':
          renderProblem()
          break

        case 'math_submit_answer': {
          const wasCorrect = result.summary && result.summary.startsWith('Correct')
          showFeedback(
            wasCorrect ? 'Correct!' : `Incorrect. The answer was ${state.problems?.[state.currentIndex - 1]?.answer ?? '?'}.`,
            wasCorrect ? 'correct' : 'incorrect'
          )
          if (state.finished) {
            setTimeout(() => renderSummary(), 1500)
          } else {
            setTimeout(() => {
              renderProblem()
              answerInput.focus()
            }, 1500)
          }
          break
        }

        case 'math_get_hint':
          if (result.summary) {
            hintTextEl.textContent = result.summary
            hintTextEl.classList.remove('hidden')
            sendResize()
          }
          break

        case 'math_finish_session':
          renderSummary()
          break
      }
    }

    function renderProblem() {
      waitingEl.classList.add('hidden')
      summaryEl.classList.add('hidden')
      gameEl.classList.remove('hidden')

      const { problems, currentIndex = 0, topic = 'addition', difficulty = 'easy', totalProblems = 5 } = state

      if (!problems || currentIndex >= problems.length) return

      topicBadge.textContent = topic
      difficultyBadge.textContent = difficulty
      difficultyBadge.className = `difficulty-badge ${difficulty}`

      currentNumEl.textContent = currentIndex + 1
      totalNumEl.textContent = totalProblems
      progressFill.style.width = `${(currentIndex / totalProblems) * 100}%`

      questionEl.textContent = problems[currentIndex].question

      answerInput.value = ''
      hintTextEl.classList.add('hidden')
      feedbackEl.classList.add('hidden')
      submitBtn.disabled = false

      sendResize()
    }

    function renderSummary() {
      waitingEl.classList.add('hidden')
      gameEl.classList.add('hidden')
      summaryEl.classList.remove('hidden')

      const correct = state.correct ?? 0
      const total = (state.correct ?? 0) + (state.incorrect ?? 0)
      const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0

      document.getElementById('summaryScore').textContent = `${correct}/${total}`
      document.getElementById('summaryAccuracy').textContent = `${accuracy}% accuracy`

      const wrongAnswers = state.wrongAnswers ?? []
      const wrongList = document.getElementById('wrongList')
      const wrongItems = document.getElementById('wrongItems')

      if (wrongAnswers.length > 0) {
        wrongList.classList.remove('hidden')
        wrongItems.innerHTML = wrongAnswers.map((w) => `
          <div class="wrong-item">
            ${w.question} &rarr; <span class="your-answer">${w.yourAnswer}</span>
            <span class="correct-answer">${w.correctAnswer}</span>
          </div>
        `).join('')
      } else {
        wrongList.classList.add('hidden')
      }

      sendToHost({
        type: 'app.complete',
        summary: `Math practice complete: ${correct}/${total} correct (${accuracy}%)`,
      })

      sendResize()
    }

    function syncToParent() {
      sendToHost({ type: 'app.state_patch', state })
    }

    async function submitAnswer() {
      const value = answerInput.value.trim()
      if (value === '') return

      submitBtn.disabled = true

      try {
        const res = await fetch('/api/tools/math_submit_answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ args: { answer: Number(value) }, sessionState: state }),
        })
        const result = await res.json()
        handleToolResult('math_submit_answer', result)
        // Sync AFTER state is updated by handleToolResult
        syncToParent()
      } catch {
        showFeedback('Connection error', 'incorrect')
        submitBtn.disabled = false
      }
    }

    async function requestHint() {
      try {
        const res = await fetch('/api/tools/math_get_hint', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ args: {}, sessionState: state }),
        })
        const result = await res.json()
        handleToolResult('math_get_hint', result)
        syncToParent()
      } catch {
        showFeedback('Connection error', 'incorrect')
      }
    }

    function showFeedback(text, type) {
      if (feedbackTimeout) clearTimeout(feedbackTimeout)
      feedbackEl.textContent = text
      feedbackEl.className = `feedback ${type}`
      feedbackEl.classList.remove('hidden')
      sendResize()
      feedbackTimeout = setTimeout(() => {
        feedbackEl.classList.add('hidden')
        sendResize()
      }, 2000)
    }

    // Enter key submits
    answerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitAnswer()
    })

    // Init: send ready
    sendToHost({ type: 'app.ready', appId: 'math-practice' })
    sendResize()
  </script>
</body>
</html>
