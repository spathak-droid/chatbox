<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #302e2b;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px;
  }

  #status {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
    text-align: center;
    min-height: 22px;
  }
  #status.error { color: #ff6b6b; }
  #status.thinking { color: #f0c040; }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: min(88vw, 380px);
    aspect-ratio: 1;
    border: 2px solid #555;
    border-radius: 4px;
    overflow: hidden;
  }

  .square {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* Chess.com colors */
  .square.light { background: #eeeed2; }
  .square.dark { background: #769656; }
  .square.selected.light { background: #f6f669; }
  .square.selected.dark { background: #baca2b; }
  .square.last-move.light { background: #f6f669; }
  .square.last-move.dark { background: #baca2b; }

  /* Legal move dot on empty square */
  .square.legal-target::after {
    content: '';
    position: absolute;
    width: 26%;
    height: 26%;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.18);
    pointer-events: none;
  }
  /* Legal capture ring on occupied square */
  .square.legal-capture::after {
    content: '';
    position: absolute;
    width: 88%;
    height: 88%;
    border-radius: 50%;
    border: 4px solid rgba(0, 0, 0, 0.18);
    background: transparent;
    pointer-events: none;
  }

  /* Piece styling */
  .piece {
    font-size: min(9vw, 40px);
    line-height: 1;
    text-align: center;
    pointer-events: none;
  }
  .piece.white {
    color: #fff;
    text-shadow:
      -1px -1px 0 #000,
       1px -1px 0 #000,
      -1px  1px 0 #000,
       1px  1px 0 #000,
       0   -1px 0 #000,
       0    1px 0 #000,
      -1px  0   0 #000,
       1px  0   0 #000;
  }
  .piece.black {
    color: #312e2b;
    text-shadow:
      -1px -1px 0 #999,
       1px -1px 0 #999,
      -1px  1px 0 #999,
       1px  1px 0 #999,
       0   -1px 0 #999,
       0    1px 0 #999,
      -1px  0   0 #999,
       1px  0   0 #999;
  }

  #moves-panel {
    margin-top: 6px;
    width: min(88vw, 380px);
    max-height: 80px;
    overflow-y: auto;
    font-size: 12px;
    color: #aaa;
    line-height: 1.5;
    text-align: center;
    word-wrap: break-word;
  }
  #moves-panel span { margin: 0 2px; }
  #moves-panel .move-num { color: #666; }
</style>
</head>
<body>
<div id="status">Waiting for game...</div>
<div id="board"></div>
<div id="moves-panel"></div>

<script>
// ============ STATE ============
let gameState = null
let selected = null
let legalTargets = []  // squares the selected piece can move to
let lastMoveFrom = null
let lastMoveTo = null
let sending = false

const PIECES = {
  K: '\u2654', Q: '\u2655', R: '\u2656', B: '\u2657', N: '\u2658', P: '\u2659',
  k: '\u265A', q: '\u265B', r: '\u265C', b: '\u265D', n: '\u265E', p: '\u265F',
}

// ============ FEN PARSING ============
function parseFen(fen) {
  const rows = fen.split(' ')[0].split('/')
  const board = []
  for (const row of rows) {
    const boardRow = []
    for (const ch of row) {
      if (ch >= '1' && ch <= '8') {
        for (let i = 0; i < parseInt(ch); i++) boardRow.push(null)
      } else {
        boardRow.push(ch)
      }
    }
    board.push(boardRow)
  }
  return board
}

function getTurn(fen) { return fen.split(' ')[1] || 'w' }

function toAlgebraic(row, col, flipped) {
  const r = flipped ? row : 7 - row
  const c = flipped ? 7 - col : col
  return String.fromCharCode(97 + c) + (r + 1)
}

function isOwnPiece(piece, playerColor) {
  if (!piece) return false
  return playerColor === 'white' ? piece === piece.toUpperCase() : piece === piece.toLowerCase()
}

function isWhitePiece(piece) { return piece === piece.toUpperCase() }

function isPlayerTurn(fen, playerColor) {
  const turn = getTurn(fen)
  return (turn === 'w' && playerColor === 'white') || (turn === 'b' && playerColor === 'black')
}

// ============ FETCH LEGAL MOVES ============
async function fetchLegalMoves(square) {
  try {
    const res = await fetch('/api/legal-moves', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fen: gameState.fen, square }),
    })
    const data = await res.json()
    return data.moves || []
  } catch {
    return []
  }
}

// ============ RENDERING ============
function render() {
  const boardEl = document.getElementById('board')
  const statusEl = document.getElementById('status')
  const movesEl = document.getElementById('moves-panel')

  if (!gameState) {
    boardEl.innerHTML = ''
    statusEl.textContent = 'Waiting for game...'
    statusEl.className = ''
    movesEl.innerHTML = ''
    return
  }

  const { fen, moves, playerColor, gameOver, result } = gameState
  const board = parseFen(fen)
  const flipped = playerColor === 'black'
  const myTurn = isPlayerTurn(fen, playerColor)

  if (gameOver) {
    statusEl.textContent = result || 'Game Over'
    statusEl.className = ''
  } else if (sending) {
    statusEl.textContent = 'Making move...'
    statusEl.className = 'thinking'
  } else if (!myTurn) {
    statusEl.textContent = "Opponent is thinking..."
    statusEl.className = 'thinking'
  } else {
    statusEl.textContent = 'Your turn — tap a piece to move'
    statusEl.className = ''
  }

  // Build a set of legal target squares for quick lookup
  const legalSet = new Set(legalTargets)

  boardEl.innerHTML = ''
  for (let displayRow = 0; displayRow < 8; displayRow++) {
    for (let displayCol = 0; displayCol < 8; displayCol++) {
      const row = flipped ? 7 - displayRow : displayRow
      const col = flipped ? 7 - displayCol : displayCol
      const piece = board[row][col]
      const sq = toAlgebraic(displayRow, displayCol, flipped)
      const isLight = (displayRow + displayCol) % 2 === 0

      const el = document.createElement('div')
      el.className = `square ${isLight ? 'light' : 'dark'}`

      if (selected && selected.square === sq) {
        el.classList.add('selected')
      }

      // Last move highlight
      if (sq === lastMoveFrom || sq === lastMoveTo) {
        el.classList.add('last-move')
      }

      // Legal move indicators
      if (legalSet.has(sq)) {
        el.classList.add(piece ? 'legal-capture' : 'legal-target')
      }

      if (piece) {
        const span = document.createElement('span')
        span.className = `piece ${isWhitePiece(piece) ? 'white' : 'black'}`
        span.textContent = PIECES[piece] || ''
        el.appendChild(span)
      }

      el.addEventListener('click', () => onSquareClick(displayRow, displayCol, piece, sq))
      boardEl.appendChild(el)
    }
  }

  // Move history
  movesEl.innerHTML = ''
  for (let i = 0; i < moves.length; i += 2) {
    const num = Math.floor(i / 2) + 1
    const numSpan = document.createElement('span')
    numSpan.className = 'move-num'
    numSpan.textContent = `${num}.`
    movesEl.appendChild(numSpan)

    const wSpan = document.createElement('span')
    wSpan.textContent = moves[i]
    movesEl.appendChild(wSpan)

    if (moves[i + 1]) {
      const bSpan = document.createElement('span')
      bSpan.textContent = moves[i + 1]
      movesEl.appendChild(bSpan)
    }
  }
  movesEl.scrollTop = movesEl.scrollHeight
  sendResize()
}

// ============ INTERACTION ============
async function onSquareClick(displayRow, displayCol, piece, sq) {
  if (!gameState || gameState.gameOver || sending) return
  if (!isPlayerTurn(gameState.fen, gameState.playerColor)) return

  if (selected) {
    if (selected.square === sq) {
      selected = null
      legalTargets = []
      render()
      return
    }

    if (piece && isOwnPiece(piece, gameState.playerColor)) {
      selected = { row: displayRow, col: displayCol, piece, square: sq }
      legalTargets = await fetchLegalMoves(sq)
      render()
      return
    }

    // Attempt move
    const uci = selected.square + sq
    selected = null
    legalTargets = []
    sendMove(uci)
    return
  }

  // Select own piece
  if (piece && isOwnPiece(piece, gameState.playerColor)) {
    selected = { row: displayRow, col: displayCol, piece, square: sq }
    legalTargets = await fetchLegalMoves(sq)
    render()
  }
}

// ============ DIRECT API CALLS ============
async function sendMove(uci) {
  if (sending) return
  sending = true
  lastMoveFrom = uci.slice(0, 2)
  lastMoveTo = uci.slice(2, 4)
  render()

  try {
    const response = await fetch('/api/tools/chess_submit_move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        args: { move: uci },
        sessionState: gameState,
      }),
    })

    const result = await response.json()

    if (result.error || result.status === 'error') {
      showError(result.error || 'Invalid move')
      lastMoveFrom = null
      lastMoveTo = null
      sending = false
      render()
      return
    }

    if (result.data) {
      gameState = {
        fen: result.data.fen,
        moves: result.data.moves || gameState.moves,
        playerColor: result.data.playerColor || gameState.playerColor,
        gameOver: result.data.gameOver || false,
        result: result.data.result,
      }
    }

    sending = false
    render()
    notifyParent()

    // After 1 second, make opponent move (if game not over)
    if (gameState && !gameState.gameOver && !isPlayerTurn(gameState.fen, gameState.playerColor)) {
      setTimeout(() => fetchAiMove(), 1000)
    }

  } catch (err) {
    showError('Connection error')
    sending = false
    render()
  }
}

async function fetchAiMove() {
  if (!gameState || gameState.gameOver) return
  sending = true
  render()

  try {
    const response = await fetch('/api/ai-move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionState: gameState }),
    })

    const result = await response.json()

    if (result.data) {
      // Figure out opponent's last move for highlighting
      const newMoves = result.data.moves || []
      const oldMoves = gameState.moves || []
      if (newMoves.length > oldMoves.length) {
        // Can't easily get from/to from SAN, just clear highlights
        lastMoveFrom = null
        lastMoveTo = null
      }

      gameState = {
        fen: result.data.fen,
        moves: result.data.moves || gameState.moves,
        playerColor: result.data.playerColor || gameState.playerColor,
        gameOver: result.data.gameOver || false,
        result: result.data.result,
      }
    }
  } catch (err) {
    showError('Opponent error')
  }

  sending = false
  render()
  notifyParent()
}

function notifyParent() {
  if (!gameState) return
  window.parent.postMessage({
    type: 'app.state_patch',
    state: gameState,
  }, '*')
  if (gameState.gameOver) {
    window.parent.postMessage({
      type: 'app.game_over',
      gameOver: true,
      result: gameState.result,
      playerColor: gameState.playerColor,
    }, '*')
  }
}

// ============ ERROR DISPLAY ============
function showError(msg) {
  const statusEl = document.getElementById('status')
  statusEl.textContent = msg
  statusEl.className = 'error'
  setTimeout(() => { if (gameState) render() }, 2500)
}

// ============ POSTMESSAGE BRIDGE ============
function sendResize() {
  window.parent.postMessage({ type: 'app.resize', height: document.body.scrollHeight }, '*')
}

window.addEventListener('message', (event) => {
  const msg = event.data
  if (!msg || !msg.type) return

  switch (msg.type) {
    case 'host.init': {
      const state = msg.state?.chess || (msg.state?.fen ? msg.state : null)
      if (state) {
        gameState = state
        render()
      }
      break
    }
    case 'host.state_patch': {
      const patch = msg.patch || msg.state_patch
      if (patch?.chess !== undefined) gameState = patch.chess
      else if (patch?.fen) gameState = patch
      selected = null
      legalTargets = []
      render()
      break
    }
  }
})

// ============ INIT ============
window.addEventListener('load', () => {
  window.parent.postMessage({ type: 'app.ready' }, '*')
  render()
  sendResize()
})
</script>
</body>
</html>
